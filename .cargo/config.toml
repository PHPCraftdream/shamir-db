[profile.dev]
codegen-units = 1
debug = 0
incremental = false

[profile.dev.package."*"]
opt-level = 2

[profile.dev.package.shamir_db]
opt-level = 0
debug = false

# ---------------------------------------------------------------------------
# Test-only speedups — only the `[profile.test]` block. `[profile.dev]` (above)
# is left untouched: those values are an intentional choice for the dev
# runtime of the server binary, not for tests.
#
# A faster linker (rust-lld) was tried first; it ships with rustup but on
# the windows-gnu host it cannot link proc-macro DLLs (`_DllMainCRTStartup`
# undefined — known limitation). On windows-msvc rust-lld works as drop-in
# for link.exe; if you ever switch the toolchain, add:
#   [target.x86_64-pc-windows-msvc]
#   linker = "rust-lld"
# back into this file.
# ---------------------------------------------------------------------------

# Test-binary compilation: spread codegen across CPUs and reuse incremental
# artefacts so the second `cargo test` finishes in seconds, not minutes.
# `debug = 1` keeps line-number info for backtraces but skips full type info,
# shrinking the linked exe by megabytes.
[profile.test]
codegen-units = 256
incremental = true
debug = 1

# ---------------------------------------------------------------------------
# Test command aliases — the SINGLE entry point for running tests.
#
# Background: we lost hours twice to silent test hangs. `cargo test` piped to
# grep on Windows fully buffers (no output for 10+ min); a single deadlocked
# e2e test hangs the whole run forever. CLAUDE.md mandates `cargo nextest`
# with per-test timeout (.config/nextest.toml). These aliases enforce that
# convention so nobody (human or sub-agent) reaches for raw `cargo test`.
#
# Use:
#   cargo t                  — run all workspace tests with hang protection
#   cargo t -p <crate>       — narrow to one crate
#   cargo t -p <crate> -- <filter>  — narrow further by test name
#   cargo tl                 — lib tests only (fastest signal during /opti)
#
# Raw `cargo test` is only for `--lib` of a single crate during local
# scratch — DO NOT use it for --workspace or --tests runs.
# ---------------------------------------------------------------------------
[alias]
t  = "nextest run --no-fail-fast"
tl = "nextest run --lib --no-fail-fast"
