[profile.dev]
codegen-units = 1
debug = 0
incremental = false

[profile.dev.package."*"]
opt-level = 2

[profile.dev.package.shamir_db]
opt-level = 0
debug = false

# ---------------------------------------------------------------------------
# Test-only speedups — only the `[profile.test]` block. `[profile.dev]` (above)
# is left untouched: those values are an intentional choice for the dev
# runtime of the server binary, not for tests.
#
# A faster linker (rust-lld) was tried first; it ships with rustup but on
# the windows-gnu host it cannot link proc-macro DLLs (`_DllMainCRTStartup`
# undefined — known limitation). On windows-msvc rust-lld works as drop-in
# for link.exe; if you ever switch the toolchain, add:
#   [target.x86_64-pc-windows-msvc]
#   linker = "rust-lld"
# back into this file.
# ---------------------------------------------------------------------------

# Test-binary compilation: spread codegen across CPUs and reuse incremental
# artefacts so the second `cargo test` finishes in seconds, not minutes.
# `debug = 1` keeps line-number info for backtraces but skips full type info,
# shrinking the linked exe by megabytes.
[profile.test]
codegen-units = 256
incremental = true
debug = 1

# ---------------------------------------------------------------------------
# Test command aliases — the SINGLE entry point for running tests.
#
# Background: we lost hours twice to silent test hangs. `cargo test` piped to
# grep on Windows fully buffers (no output for 10+ min); a single deadlocked
# e2e test hangs the whole run forever. CLAUDE.md mandates `cargo nextest`
# with per-test timeout (.config/nextest.toml). These aliases enforce that
# convention so nobody (human or sub-agent) reaches for raw `cargo test`.
#
# Use:
#   cargo t                  — run all workspace tests with hang protection
#   cargo t -p <crate>       — narrow to one crate
#   cargo t -p <crate> -- <filter>  — narrow further by test name
#   cargo tl                 — lib tests only (fastest signal during /opti)
#
# Raw `cargo test` is only for `--lib` of a single crate during local
# scratch — DO NOT use it for --workspace or --tests runs.
# ---------------------------------------------------------------------------
[alias]
t  = "nextest run --no-fail-fast"
tl = "nextest run --lib --no-fail-fast"

# ---------------------------------------------------------------------------
# Cargo runner — perimeter defense.
#
# Cargo invokes the configured runner for every test/bench binary it wants
# to execute. Our runner (`scripts/cargo-test-guard.sh`) lets bench binaries
# through (release-profile path) and lets blessed runs through
# (SHAMIR_TEST_BLESSED=1, set by ./scripts/test.sh + cargo t / cargo tl),
# but BLOCKS bare `cargo test` with a clear error pointing at the
# centralised entry point. nextest itself bypasses this runner — it
# launches binaries directly — so the legitimate path stays fast.
# ---------------------------------------------------------------------------
[target.'cfg(all())']
# Inline guard — cargo invokes this for every test/bench binary.
# - Lets release-profile binaries through (bench harnesses).
# - Lets blessed runs through (SHAMIR_TEST_BLESSED=1, set by
#   ./scripts/test.sh + cargo t / cargo tl).
# - Otherwise prints a clear refusal and exits 2.
# nextest bypasses the runner entirely (launches binaries direct),
# so the centralised entry point stays fast.
# Inlined here (not a separate script) so bash always finds it
# regardless of cargo's invocation cwd.
runner = ["bash", "-c", "case \"$0\" in */release/*|*\\\\release\\\\*) exec \"$0\" \"$@\";; esac; if [ -n \"${SHAMIR_TEST_BLESSED:-}\" ]; then exec \"$0\" \"$@\"; fi; printf '\\n══════════════════════════════════════════════════════════════════════\\n  ⛔  Direct `cargo test` is BANNED in this repository.\\n\\n  Use the centralised entry point (see CLAUDE.md §🧪):\\n    ./scripts/test.sh                  # lib tests, all crates\\n    ./scripts/test.sh --full           # + integration + e2e\\n    cargo t                            # alias for --full\\n    cargo tl                           # alias for lib\\n\\n  Why: silent multi-hour hangs (Windows pipe-buffering + e2e\\n  deadlocks). The wrapper enforces per-test timeouts.\\n\\n  One-shot debug bypass:\\n    SHAMIR_TEST_BLESSED=1 cargo test -p <crate> --lib -- <name>\\n══════════════════════════════════════════════════════════════════════\\n' >&2; exit 2"]
