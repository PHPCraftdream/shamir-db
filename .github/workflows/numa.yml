name: numa

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Tier 1 — DI-mock unit tests. Platform-independent (no real NUMA syscalls),
  # so they pass on every runner. This is the gating signal for the
  # shamir-numa crate; the main ci.yml `--workspace --lib` matrix also covers
  # it, but a dedicated job keeps the NUMA signal legible.
  tier1-mock:
    name: numa tier1 mock (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
      # Pinned to nextest@0.9.137 — same baseline as ci.yml's test/integration
      # jobs (see ci.yml's nextest pin comment for the guard-coupling rationale).
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.137
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/test.sh -p shamir-numa

  # Tier 3 — QEMU NUMA emulation (smoke level, opt-in). Boots a 2-node QEMU
  # guest and confirms the kernel sees both NUMA nodes via serial-console
  # discovery messages. Full cargo-test-inside-guest is gated by KVM
  # availability — see scripts/ci-qemu-numa-test.sh header for the path to
  # full integration. Opt-in via `[numa-qemu]` flag in commit message so it
  # never runs (and never reddens) by default.
  tier3-qemu:
    name: numa tier3 qemu emulation (opt-in)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[numa-qemu]')
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install QEMU + numactl
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils numactl
      - name: Boot 2-node QEMU and run Linux integration tests
        timeout-minutes: 30
        run: bash scripts/ci-qemu-numa-test.sh
