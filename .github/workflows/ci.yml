name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Fast primary signal: the ~1500 library unit tests. Matches the
  # project's stated pre-commit gate in CLAUDE.md ("Code quality
  # (MANDATORY)"): `cargo test --workspace --lib`. Kept as its own job so
  # the dominant signal stays fast and is not held hostage by the slower,
  # heavier integration build below.
  test:
    name: cargo test (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib

  # Integration gate: the test files under `crates/*/tests/`. Before this
  # job these only had to COMPILE (clippy --all-targets) — they never RAN
  # on a PR. This includes the only real fsync-durability-across-restart
  # coverage (`shamir-server/tests/server_meta.rs`, `persistence_e2e.rs`,
  # `backup_restore_e2e.rs`), the in-process server↔client TLS+SCRAM e2e
  # (`mvp_e2e.rs`, `mvp_ws_e2e.rs`, `shamir-client/tests/smoke.rs`), the
  # connection-cap / slow-loris defences (`max_connections.rs`,
  # `slow_loris.rs`) and the `shamir-db/tests/query_*.rs` wire-path suite.
  #
  # `--test '*'` selects ONLY the integration test targets. We deliberately
  # do NOT use `--all-targets` here: that also builds and *runs* the
  # `criterion` benches (each `bench` target has a real `fn main` via
  # `criterion_main!`), so `cargo test --all-targets` would execute the
  # full benchmark suites — slow and pointless as a correctness gate.
  #
  # Thread policy: default (parallel). Every integration test was audited
  # to be parallel-safe — each uses its own `tempfile::TempDir` and binds
  # TCP listeners to an ephemeral port (`127.0.0.1:0`, OS-assigned), so
  # there are no shared-disk-path or fixed-port collisions across tests.
  # (The one fixed-relative-path test, `storage_sled::test_sled_transact_atomic`
  # at `./test_data/sled_transact`, is a `--lib` test gated by the `test`
  # job above, not an integration target, and uses a path unique to that
  # test — it does not collide with siblings.) If a future integration
  # test introduces a shared-path/fixed-port hazard, gate it with
  # `serial_test::#[serial]` (already a dev-dependency) rather than
  # forcing `--test-threads=1` on the whole suite.
  #
  # NOTE: the Node.js e2e suite under `tests/e2e/` is intentionally NOT
  # wired in here. It requires `npm install`, a release `shamir-server`
  # build, and the MSVC-only `shamir-client-node` napi binding (excluded
  # from the workspace) — too heavy for a per-PR gate. Run it manually per
  # `tests/e2e/README.md`; promoting it to a scheduled/nightly workflow is
  # a follow-up.
  integration:
    name: cargo test (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --test '*'
