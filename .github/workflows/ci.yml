name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Lint on every supported OS. Crucial for cross-platform correctness:
  # `#[cfg(windows)]` / `#[cfg(target_os = "macos")]` branches (service
  # installers, runtime, signal handling) are ONLY compiled — and therefore
  # only linted — on the matching OS. An ubuntu-only clippy never saw them.
  clippy:
    name: cargo clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Fast primary signal: the ~2700 library unit tests, on every OS. Matches
  # the project's stated pre-commit gate in CLAUDE.md ("Code quality
  # (MANDATORY)"): `cargo test --workspace --lib`. Kept as its own job so
  # the dominant signal stays fast and is not held hostage by the slower,
  # heavier integration build below. Matrixed across OSes so Windows /
  # macOS regressions (path handling, file locking, fsync) are caught.
  test:
    name: cargo test lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
      # Pinned to the cargo-nextest version documented as the perimeter-guard
      # baseline in .config/nextest.toml (0.9.137, commit 75ddba7e9). The
      # cargo-runner guard in .cargo/config.toml gates on the $NEXTEST env var
      # that cargo-nextest sets; pinning prevents a silent future upgrade from
      # renaming/removing it and fail-closing ALL test runs. The shorthand
      # `taiki-e/install-action@nextest` form cannot pin a version — the
      # full-form `@v2` + `with: { tool: "nextest@X.Y.Z" }` is required.
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.137
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/test.sh --locked

  # Integration gate: the test files under `crates/*/tests/`. Before this
  # job these only had to COMPILE (clippy --all-targets) — they never RAN
  # on a PR. This includes the only real fsync-durability-across-restart
  # coverage (`shamir-server/tests/server_meta.rs`, `persistence_e2e.rs`,
  # `backup_restore_e2e.rs`), the in-process server↔client TLS+SCRAM e2e
  # (`mvp_e2e.rs`, `mvp_ws_e2e.rs`, `shamir-client/tests/smoke.rs`), the
  # connection-cap / slow-loris defences (`max_connections.rs`,
  # `slow_loris.rs`) and the `shamir-db/tests/query_*.rs` wire-path suite.
  #
  # `--test '*'` selects ONLY the integration test targets. We deliberately
  # do NOT use `--all-targets` here: that also builds and *runs* the
  # `criterion` benches (each `bench` target has a real `fn main` via
  # `criterion_main!`), so `cargo test --all-targets` would execute the
  # full benchmark suites — slow and pointless as a correctness gate.
  #
  # Thread policy: default (parallel). Every integration test was audited
  # to be parallel-safe — each uses its own `tempfile::TempDir` and binds
  # TCP listeners to an ephemeral port (`127.0.0.1:0`, OS-assigned), so
  # there are no shared-disk-path or fixed-port collisions across tests.
  # (The one fixed-relative-path test, `storage_sled::test_sled_transact_atomic`
  # at `./test_data/sled_transact`, is a `--lib` test gated by the `test`
  # job above, not an integration target, and uses a path unique to that
  # test — it does not collide with siblings.) If a future integration
  # test introduces a shared-path/fixed-port hazard, gate it with
  # `serial_test::#[serial]` (already a dev-dependency) rather than
  # forcing `--test-threads=1` on the whole suite.
  #
  # NOTE: the Node.js e2e suite under `tests/e2e/` is intentionally NOT
  # wired in here. It requires `npm install`, a release `shamir-server`
  # build, and the MSVC-only `shamir-client-node` napi binding (excluded
  # from the workspace) — too heavy for a per-PR gate. Run it manually per
  # `tests/e2e/README.md`; promoting it to a scheduled/nightly workflow is
  # a follow-up.
  # Matrixed across OSes — this is the suite that actually exercises sockets,
  # TLS+SCRAM, fsync-durability-across-restart, and the storage backends'
  # on-disk file locking, where OS differences bite hardest.
  integration:
    name: cargo test integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
      # Pinned to the cargo-nextest version documented as the perimeter-guard
      # baseline in .config/nextest.toml (0.9.137, commit 75ddba7e9). The
      # cargo-runner guard in .cargo/config.toml gates on the $NEXTEST env var
      # that cargo-nextest sets; pinning prevents a silent future upgrade from
      # renaming/removing it and fail-closing ALL test runs. The shorthand
      # `taiki-e/install-action@nextest` form cannot pin a version — the
      # full-form `@v2` + `with: { tool: "nextest@X.Y.Z" }` is required.
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.137
      - uses: Swatinem/rust-cache@v2
      # bash on every runner (Git Bash on Windows). `-E 'kind(test)'` selects
      # ONLY integration test binaries (crates/*/tests/*.rs) — the nextest
      # filterset equivalent of cargo's `--test '*'` target selector; it
      # deliberately excludes `kind(lib)` (covered by the `test` job above)
      # and `kind(bench)` (never a correctness gate).
      - run: ./scripts/test.sh --full --locked -E 'kind(test)'
        shell: bash

  # Supply-chain cooldown gate (RFC 3923, fail-closed) — fails the PR if
  # resolving the workspace would pull a crate version younger than 30 days
  # (config: /cooldown.toml). The `--locked` flags above keep the other jobs on
  # the committed Cargo.lock; THIS job catches a PR that introduces a too-fresh
  # dependency. Native cargo support is pending, so we use the cargo-cooldown
  # subcommand. `check` restores the original lock if enforcement fails.
  cooldown:
    name: dependency cooldown (30d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --locked cargo-cooldown
      - run: cargo cooldown check
