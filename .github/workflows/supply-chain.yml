name: supply-chain

# Automated supply-chain gate (audit C1).
#
# Three jobs on different cadences:
#
#  - `deny` runs on EVERY push/PR to master. `cargo deny check` is fast (no
#    compile), hermetic (consults Cargo.lock + deny.toml), and catches the
#    push-time regressions: a newly-unsatisfiable license expression, a yanked
#    crate entering the tree, a duplicate-version explosion, or a
#    not-yet-known-registry/git source. It also runs the advisory-db check, so
#    a dependency bump that pulls in a crate with a *known* RUSTSEC at PR time
#    fails here.
#
#  - `audit` runs on a SCHEDULE (weekly) AND on demand (`workflow_dispatch`).
#    RUSTSEC advisories are published continuously and independently of this
#    repo's commits — a dep that was clean when merged can become advisory-flagged
#    weeks later with no code change here. A weekly cadence balances signal
#    freshness against advisory-db churn/noise (daily would fire on many
#    advisories that get withdrawn or that don't apply to our locked versions);
#    the manual trigger lets a maintainer run it immediately after a published
#    advisory that's relevant to us. `cargo audit` and `cargo deny check
#    advisories` overlap intentionally — audit is the RustSec-ecosystem-native
#    tool, deny is the policy gate; running both on schedule is cheap belt-and-
#    braces.
#
#  - `sbom` generates a CycloneDX SBOM on demand (`workflow_dispatch` only).
#    Per release-audit report 03 finding P7 (capability-matrix row 7c): the
#    license/advisory *gating* above is strong, but no machine-readable SBOM
#    artifact was produced. This job closes that gap. It runs `cargo cyclonedx`
#    which emits one `<crate-name>.cdx.json` per workspace member, next to
#    each crate's Cargo.toml (per-crate dependency trees, which is strictly
#    more information than a single merged SBOM), then uploads them as a
#    GitHub Actions build artifact.
#
#    Cadence: `workflow_dispatch`-only for on-demand/scheduled SBOM
#    generation. Release-tag SBOMs (`v*` tag push) are now produced by the
#    dedicated release pipeline in `.github/workflows/release.yml`, whose
#    `sbom` job mirrors this one's pinned cargo-cyclonedx recipe (0.5.9,
#    CycloneDX 1.5, per-crate `*.cdx.json`) so the GitHub Release can attach
#    them in the same run (`needs:` cannot span separately-triggered
#    workflows, and widening THIS file's `on.push` to `tags: ['v*']` would
#    also make the `deny` job run on every release tag for no release value).
#    This job is retained for between-release / on-demand SBOM generation.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Sundays 03:17 UTC — picked off the top/bottom of the hour to ease load on
    # the shared GitHub Actions runner pool. Weekly matches the dependabot
    # cadence in dependabot.yml so audit findings and Dependabot update PRs
    # arrive in the same weekly window.
    - cron: "17 3 * * 0"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Per-push/per-PR policy gate: licenses, bans, sources, AND advisories.
  # Runs against the committed Cargo.lock + deny.toml.
  deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # `cargo deny check` needs a Cargo.lock to resolve the graph; it does not
      # need a Rust toolchain to *check*, but `cargo-deny` shells out to cargo
      # for metadata, so we install the toolchain pinned by rust-toolchain.toml.
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install cargo-deny
        # Pinned: `--locked` only pins cargo-deny's OWN Cargo.lock during
        # its build, not which version gets installed. `--version` pins the
        # exact crates.io release (same convention as the cargo-cooldown pin
        # in ci.yml). When upgrading, bump the version here.
        run: cargo install --locked --version 0.20.2 cargo-deny
      - name: cargo deny check
        # No `--locked` on deny itself; the lockfile is consulted read-only.
        # All four check categories run so a single job is the gate.
        run: cargo deny check

  # Periodic advisory scan. Scheduled + manual only (not per-push) because the
  # advisory database evolves independently of commits — running it on every PR
  # would flap the gate on advisories that don't touch our locked versions.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Only the scheduled + manual triggers want this job. On push/PR the `deny`
    # job above already covers the advisory-db check against the PR's lockfile;
    # this job's value is the time-decoupled re-scan.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install cargo-audit
        # Pinned: same rationale as cargo-deny above.
        run: cargo install --locked --version 0.22.2 cargo-audit
      # `--file Cargo.lock` pins the scan to the committed lockfile (no network
      # resolution). `--ignore` is intentionally absent here — every advisory
      # audit finds should surface. If a finding is a genuine false positive or
      # a triaged-yet-unpatched case, silence it via the ignore list in a
      # committed config (`.cargo/audit.toml`) with a reason + tracking issue,
      # not via a CI flag that lives only in the workflow.
      - name: cargo audit
        run: cargo audit --file Cargo.lock

  # On-demand CycloneDX SBOM generation (release-audit report 03, P7 / row 7c).
  # Produces machine-readable dependency inventory for release evidence.
  # `workflow_dispatch`-only: see the top-of-file rationale for why no tag
  # trigger is wired yet.
  sbom:
    name: cargo cyclonedx (SBOM)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install cargo-cyclonedx
        # Pinned: same rationale as cargo-deny above.
        run: cargo install --locked --version 0.5.9 cargo-cyclonedx
      # `-f json` emits CycloneDX JSON (widely consumed by SBOM tooling).
      # `--spec-version 1.5` is the latest CycloneDX spec. The tool produces
      # one `<crate-name>.cdx.json` per workspace member (per-crate
      # dependency trees), placed adjacent to each crate's `Cargo.toml` —
      # verified locally against this workspace: 23 files, one per member
      # crate declared in the root Cargo.toml's `members = ["crates/*"]`.
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx -f json --spec-version 1.5
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-${{ github.run_id }}
          path: crates/*/*.cdx.json
          if-no-files-found: error
