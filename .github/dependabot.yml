# Dependabot version updates with a 30-day cooldown — the bot-PR vector of the
# supply-chain cooldown policy. The lockfile-level enforcement lives in
# /cooldown.toml (cargo-cooldown) + the `cooldown` CI job; this stops Dependabot
# from even PROPOSING a bump to a version younger than 30 days.
# Security advisories (GHSA/RUSTSEC) bypass the cooldown so critical patches
# still land promptly.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
    open-pull-requests-limit: 5
  # Keep the CI actions themselves on a cooldown too (same supply-chain risk).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
