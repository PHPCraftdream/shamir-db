# --- absolute_paths (variant B) ---------------------------------------------
# Inline absolute paths deeper than 3 segments are banned — import the item
# at the top of the file. `std::mem::take` (3 segs) and anything under the
# allowed crates are fine; `a::b::c::d::new()` (4+ segs, non-allowed crate)
# must be a top-level `use`. Catches the deep-path smell without churning
# idiomatic std/tokio calls.
absolute-paths-max-segments = 5
absolute-paths-allowed-crates = ["std", "core", "alloc", "tokio"]

# --- disallowed-methods (Fx-only hashing, ideology pillar 4) ------------------
# Default-hasher (RandomState) constructors are banned: use Fx via
# `THasher` / `TMap` / `TSet` / `with_hasher(THasher::default())`.
# `with_hasher` / `with_capacity_and_hasher` (explicit hasher) stay allowed.
disallowed-methods = [
    { path = "std::collections::HashMap::new", reason = "Fx-only: TMap or HashMap::<_, _, THasher>::default()" },
    { path = "std::collections::HashMap::with_capacity", reason = "Fx-only: HashMap::with_capacity_and_hasher(n, THasher::default())" },
    { path = "std::collections::HashSet::new", reason = "Fx-only: TSet or HashSet::<_, THasher>::default()" },
    { path = "std::collections::HashSet::with_capacity", reason = "Fx-only: HashSet::with_capacity_and_hasher(n, THasher::default())" },
    { path = "dashmap::DashMap::new", reason = "Fx-only: DashMap::with_hasher(THasher::default())" },
    { path = "scc::HashMap::new", reason = "Fx-only: scc::HashMap::with_hasher(THasher::default())" },
    # --- scc O(N) len() ban (ideology pillar 3: O(x → 0)) ---------------------
    # scc's `len()` is `iter().count()` — a full O(N) traversal, NOT O(1)
    # (verified: scc-2.4.0 tree_index.rs:727, hash_map.rs:1400, hash_index.rs:990,
    # hash_cache.rs:1047). Calling it on a hot path re-introduces a hidden
    # linear cost — this bit the drainer twice (offer backpressure, drain
    # reseed). Where you need O(1) cardinality, keep an `AtomicUsize` mirror
    # updated at every mutation site (see `Drainer::window_depth`,
    # `VersionedOverlay::count`). Legitimate off-hot-path / telemetry uses
    # annotate the call with `#[allow(clippy::disallowed_methods)] // O(N) ack: <why>`.
    { path = "scc::TreeIndex::len", reason = "O(N) iter().count() — use an AtomicUsize mirror (see Drainer::window_depth)" },
    { path = "scc::HashMap::len", reason = "O(N) iter().count() — use an AtomicUsize mirror" },
    { path = "scc::HashIndex::len", reason = "O(N) iter().count() — use an AtomicUsize mirror" },
    { path = "scc::HashCache::len", reason = "O(N) iter().count() — use an AtomicUsize mirror" },
    { path = "scc::HashSet::len", reason = "O(N) iter().count() — use an AtomicUsize mirror" },
]

# --- disallowed-types (Fx-only hasher type ban, ideology pillar 4) -------------
# Ban the std SipHash collection TYPES so they are unconstructable by ANY path
# (new / default / collect / inference). The ONE sanctioned allow-site is the
# crate-level `#![allow(clippy::disallowed_types)]` in `shamir-collections`.
disallowed-types = [
    { path = "std::collections::HashMap", reason = "use shamir_collections::TFxMap / TMap (Fx hasher); raw std HashMap only at the one #[allow] alias site in shamir-collections" },
    { path = "std::collections::HashSet", reason = "use shamir_collections::TFxSet / TSet (Fx hasher); raw std HashSet only at the one #[allow] alias site in shamir-collections" },
    { path = "std::collections::hash_map::RandomState", reason = "SipHash builder — never construct it; use shamir_collections::THasher" },
]
