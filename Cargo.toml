[package]
name = "shamir-db"
version = "0.1.0"
edition = "2021"

[dependencies]
smallvec = "1.11"
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.149"
fxhash = "0.2.1"
once_cell = "1.20.2"
regex = "1.11.1"
unicode-normalization = "0.1.24"
rayon = "1.10.0"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
env_logger = "0.10"
rust_decimal = { version = "1.40.0", features = ["serde"] }
# Added for BigInt support
num-bigint = { version = "0.4", features = ["serde"] }

# --- Storage Engines ---
redb = "3.1.0"
surrealkv = "0.17.0"
fjall = "3.0.1"
canopydb = "0.2.5"
sled = "0.34.7"
nebari = "0.5.5"
persy = "1.7.1"

# --- Core Dependencies ---
tokio = { version = "1.49.0", features = ["full"] }
rmp-serde = "1.3.0"
dashmap = "6.1.0"
crc32fast = "1.3"
thiserror = "2.0.18"
anyhow = "1.0"
arc-swap = "1.8.0"
rand = "0.9.2"
base-x = "0.2"
async-trait = "0.1.81"
bytes = "1.11.0"


[dev-dependencies]
tempfile = "3.10.1"
serial_test = "3.3.1"

[profile.dev]
opt-level = 0
codegen-units = 14
incremental = true

[profile.release]
lto = "fat"
opt-level = 3
codegen-units = 14
incremental = true
strip = true
